document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 color: var(--text-muted); margin-bottom: 20px; }\n  .growth-budget {\n    background: rgba(255,255,255,0.06); border-radius: 10px; padding: 14px;\n    font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 800;\n  }\n  .growth-budget-label { font-size: 11px; color: var(--text-muted); font-weight: 400; font-family: 'Nunito Sans', sans-serif; margin-bottom: 2px; }\n\n  .growth-total {\n    background: rgba(35,61,255,0.08); border: 1px solid rgba(35,61,255,0.3);\n    border-radius: 16px; padding: 32px;\n    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; text-align: center;\n  }\n  .growth-total-val {\n    font-family: 'Montserrat', sans-serif; font-size: 40px; font-weight: 900; line-height: 1;\n    color: var(--green);\n  }\n  .growth-total-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; margin-top: 6px; }\n\n  /* \u2500\u2500 AI MAX \u2500\u2500 */\n  .aimax-wrap {\n    background: linear-gradient(135deg, rgba(35,61,255,0.1), rgba(0,212,160,0.06));\n    border: 1px solid rgba(35,61,255,0.3);\n    border-radius: 24px; padding: 48px;\n    position: relative; overflow: hidden;\n  }\n  .aimax-wrap::before {\n    content: 'AI MAX EXPERIMENT';\n    position: absolute; top: 24px; right: 24px;\n    background: linear-gradient(135deg, var(--blue), var(--blue-mid));\n    font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 800;\n    letter-spacing: 0.12em; padding: 6px 14px; border-radius: 20px;\n  }\n  .aimax-title {\n    font-family: 'Montserrat', sans-serif; font-size: 28px; font-weight: 800;\n    margin-bottom: 16px; max-width: 600px;\n  }\n  .aimax-body { font-size: 16px; color: var(--text-muted); line-height: 1.8; max-width: 680px; margin-bottom: 32px; }\n  .aimax-stats { display: flex; gap: 32px; flex-wrap: wrap; }\n  .aimax-stat { }\n  .aimax-stat-val { font-family: 'Montserrat', sans-serif; font-size: 32px; font-weight: 900; line-height: 1; }\n  .aimax-stat-val.green { color: var(--green); }\n  .aimax-stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; margin-top: 4px; }\n  .aimax-examples {\n    display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px;\n  }\n  .query-chip {\n    background: rgba(255,255,255,0.08); border: 1px solid var(--card-border);\n    border-radius: 20px; padding: 8px 16px;\n    font-size: 13px; font-style: italic; color: rgba(255,255,255,0.8);\n  }\n  .query-chip::before { content: '\ud83d\udd0d '; }\n\n  /* \u2500\u2500 WEIGHSOFT SECTION \u2500\u2500 */\n  .ws-problem {\n    display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 40px;\n  }\n  .ws-pain {\n    background: rgba(232,39,26,0.06); border: 1px solid rgba(232,39,26,0.25);\n    border-radius: 20px; padding: 36px;\n  }\n  .ws-pain-head {\n    font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 800;\n    color: var(--nb-red); margin-bottom: 20px; display: flex; gap: 10px; align-items: center;\n  }\n  .ws-pain-item {\n    display: flex; gap: 14px; align-items: flex-start;\n    padding: 12px 0; border-top: 1px solid rgba(232,39,26,0.15);\n    font-size: 14px; color: var(--text-muted); line-height: 1.5;\n  }\n  .ws-pain-item strong { color: var(--white); font-size: 15px; display: block; margin-bottom: 2px; }\n  .ws-pain-dot { width: 6px; height: 6px; background: var(--nb-red); border-radius: 50%; margin-top: 8px; flex-shrink: 0; }\n  .ws-solution {\n    background: rgba(0,212,160,0.06); border: 1px solid rgba(0,212,160,0.25);\n    border-radius: 20px; padding: 36px;\n  }\n  .ws-sol-head {\n    font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 800;\n    color: var(--green); margin-bottom: 20px; display: flex; gap: 10px; align-items: center;\n  }\n  .ws-feature {\n    display: flex; gap: 14px; align-items: flex-start;\n    padding: 12px 0; border-top: 1px solid rgba(0,212,160,0.15);\n    font-size: 14px; color: var(--text-muted); line-height: 1.5;\n  }\n  .ws-feature strong { color: var(--white); font-size: 15px; display: block; margin-bottom: 2px; }\n  .ws-check { color: var(--green); font-size: 16px; flex-shrink: 0; margin-top: 1px; }\n\n  .ws-saving {\n    background: linear-gradient(135deg, rgba(0,212,160,0.12), rgba(35,61,255,0.08));\n    border: 1px solid rgba(0,212,160,0.3);\n    border-radius: 20px; padding: 40px;\n    text-align: center;\n  }\n  .ws-saving-label { font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; margin-bottom: 8px; font-family: 'Montserrat', sans-serif; }\n  .ws-saving-val {\n    font-family: 'Montserrat', sans-serif; font-size: 72px; font-weight: 900;\n    line-height: 1; color: var(--green); margin-bottom: 8px;\n  }\n  .ws-saving-sub { font-size: 15px; color: var(--text-muted); }\n\n  /* \u2500\u2500 VOICE AGENT \u2500\u2500 */\n  .voice-demo {\n    display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: start;\n  }\n  .voice-phone {\n    background: var(--card-bg); border: 1px solid var(--card-border);\n    border-radius: 24px; padding: 40px; text-align: center;\n  }\n  .phone-icon {\n    width: 80px; height: 80px; border-radius: 50%;\n    background: linear-gradient(135deg, var(--blue), var(--blue-mid));\n    display: flex; align-items: center; justify-content: center;\n    font-size: 32px; margin: 0 auto 24px;\n    box-shadow: 0 0 40px rgba(35,61,255,0.4);\n    animation: phone-glow 3s ease-in-out infinite;\n  }\n  @keyframes phone-glow {\n    0%,100% { box-shadow: 0 0 30px rgba(35,61,255,0.4); }\n    50% { box-shadow: 0 0 60px rgba(35,61,255,0.7); }\n  }\n  .phone-number {\n    font-family: 'Montserrat', sans-serif; font-size: 28px; font-weight: 800;\n    letter-spacing: 0.04em; margin-bottom: 8px;\n  }\n  .phone-label { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; }\n  .phone-live {\n    display: inline-flex; align-items: center; gap: 8px;\n    background: rgba(0,212,160,0.15); border: 1px solid rgba(0,212,160,0.4);\n    border-radius: 20px; padding: 8px 18px;\n    font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 700;\n    letter-spacing: 0.1em; text-transform: uppercase; color: var(--green);\n  }\n  .phone-live span { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }\n\n  .voice-info { }\n  .voice-agent-name {\n    font-family: 'Montserrat', sans-serif; font-size: 36px; font-weight: 900;\n    margin-bottom: 8px;\n  }\n  .voice-agent-role { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; }\n  .voice-capabilities { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }\n  .voice-cap {\n    display: flex; gap: 14px; align-items: flex-start;\n    background: var(--card-bg); border: 1px solid var(--card-border);\n    border-radius: 12px; padding: 16px;\n  }\n  .voice-cap-icon { font-size: 20px; flex-shrink: 0; }\n  .voice-cap-title { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 700; margin-bottom: 2px; }\n  .voice-cap-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; }\n\n  .voice-q2 {\n    background: rgba(245,166,35,0.08); border: 1px solid rgba(245,166,35,0.3);\n    border-radius: 16px; padding: 24px; margin-top: 24px;\n  }\n  .voice-q2-head {\n    font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 800;\n    color: var(--amber); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;\n  }\n  .voice-q2-text { font-size: 14px; color: var(--text-muted); line-height: 1.6; }\n\n  /* \u2500\u2500 AGENDA \u2500\u2500 */\n  .agenda-list { display: flex; flex-direction: column; gap: 12px; }\n  .agenda-item {\n    display: flex; gap: 20px; align-items: center;\n    background: var(--card-bg); border: 1px solid var(--card-border);\n    border-radius: 14px; padding: 20px 24px;\n    cursor: pointer; transition: all 0.2s;\n  }\n  .agenda-item:hover { border-color: var(--blue-mid); background: rgba(35,61,255,0.05); }\n  .agenda-num {\n    font-family: 'Montserrat', sans-serif; font-size: 28px; font-weight: 900;\n    color: rgba(255,255,255,0.15); line-height: 1; width: 44px; flex-shrink: 0; text-align: center;\n  }\n  .agenda-label { font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 700; }\n  .agenda-desc { font-size: 13px; color: var(--text-muted); margin-top: 2px; }\n  .agenda-arrow { margin-left: auto; color: var(--text-muted); font-size: 18px; }\n\n  /* \u2500\u2500 FOOTER \u2500\u2500 */\n  footer {\n    background: var(--navy);\n    border-top: 1px solid var(--card-border);\n    padding: 40px 60px;\n    display: flex; align-items: center; justify-content: space-between;\n  }\n  .footer-logos { display: flex; align-items: center; gap: 20px; }\n  .footer-logos img { height: 32px; object-fit: contain; opacity: 0.7; }\n  .footer-text { font-size: 12px; color: var(--text-muted); }\n\n  /* \u2500\u2500 UTILITY \u2500\u2500 */\n  .tag {\n    display: inline-block;\n    background: rgba(35,61,255,0.2); border: 1px solid rgba(35,61,255,0.4);\n    border-radius: 20px; padding: 4px 12px;\n    font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 700;\n    letter-spacing: 0.1em; text-transform: uppercase; color: var(--blue-light);\n    margin-bottom: 8px;\n  }\n  .tag.green { background: rgba(0,212,160,0.15); border-color: rgba(0,212,160,0.3); color: var(--green); }\n  .tag.red { background: rgba(232,39,26,0.15); border-color: rgba(232,39,26,0.3); color: var(--nb-red); }\n  .tag.amber { background: rgba(245,166,35,0.15); border-color: rgba(245,166,35,0.3); color: var(--amber); }\n\n  .divider { width: 100%; height: 1px; background: var(--card-border); margin: 40px 0; }\n\n  /* \u2500\u2500 SCROLL REVEAL \u2500\u2500 */\n  .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.7s ease, transform 0.7s ease; }\n  .reveal.visible { opacity: 1; transform: none; }\n\n  @media (max-width: 900px) {\n    section { padding: 100px 24px 60px; }\n    nav { padding: 0 20px; }\n    .nav-links { display: none; }\n    .perf-comparison, .ws-problem, .voice-demo, .roas-comparison { grid-template-columns: 1fr; }\n    .hero-stats, .skip-hero-stat { grid-template-columns: 1fr 1fr; }\n    .growth-grid { grid-template-columns: 1fr; }\n    .seo-metrics { grid-template-columns: 1fr 1fr; }\n    .vf-flow { grid-template-columns: 1fr; }\n    .vf-arrow { transform: rotate(90deg); }\n    .growth-total { grid-template-columns: 1fr; }\n    footer { flex-direction: column; gap: 16px; text-align: center; }\n  }\n</style>\n</head>\n<body>\n\n<!-- \u2500\u2500 NAVIGATION \u2500\u2500 -->\n<nav>\n  <div class=\"nav-logos\">\n    <span style=\"font-family:'Montserrat',sans-serif;font-weight:900;font-size:22px;letter-spacing:0.01em;line-height:1;color:#fff;white-space:nowrap;\">Tyneside <span style=\"color:#4d6bff;\">Skip Hire</span></span>\n    <div class=\"nav-sep\"></div>\n    <img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAdAAAABtCAIAAACeHKdIAAAACXBIWXMAAAsSAAALEgHS3X78AAAgAElEQVR42tS9aXMkyZEl+FTtcPe4AORVVUnWsDnTLTsfdmVWpPv//4IV2e2VkT1kt4fkkM2qygNXHO5uZqq6HzwiEIEIBIBMZJHrRRaZyICHux3Pnj69CN/yMrM+96KaSyFwDKGOcXF9baRg6nNZtYm9+/H7H375fDsaRWVjLSGGvu1Tm1wIxlBTkQIFin7//ff4/8N1Ne/JhIiYDEQwU1MzMzMCsWMiIpCYGaDAq8no13mw2968AwEMlSIiAoCZnHfEDCaAKqKHZtMAs80fYaoqRUTV1Nb3cY6ZmRkAMbkHbvXosjHAzACYwcyGrzAYETGTY2YiEU0l5yJq+mo2O/KyXRecIyImMjNTwzAH61c49myb71z/c/BgAJh5eEkB1EyBaRWOvkhnxoAW0e1QO3bODb/vnzY4P8+tYvGOag/HDIKZqaqImhkRrYd8525mpmqiwzsDANPwDwFEwP0X3L4obf5LhLspsJ1hs91PMzMRM9OwvItqm9izOUZgEMhseNj1DZjZezcsj2GSYwhPXxi/rKxmC4zKgXl4QqhqURuG12/mBgAR+AkjfHNz46uKiEAm0nr2ZAZ4kDOAyTnnAPR9H4JjAjkGkLqkIDiASUxm4an713+LXb0wIzVTbVNuYnXb3gI0LIJUZHx2bgZmTIGfLj+aGAD2tFqld6+mAESRTHxkMAhWLJNzlvJkNutTBoyAGOPfNeKaGjmyTM4Pa4uIbNjIZDB473IRBvKwA7791Zp5QBV9QRNhxkAZVj0Rw7D+l1lSNToOu8N+VIMjCIhAoLsNOGxPZmdm7GgLbM+9BHAAiETUORZd4yDWX8YAEZH3rktJTcH375AGpFPtch5V1fqoIxqeEDQsomMXAUYEMwINU7X7lzQ llIntoView({behavior:'smooth'})\">\n        <div class=\"agenda-num\">02</div>\n        <div><div class=\"agenda-label\">The Value Feedback Advantage</div><div class=\"agenda-desc\">Why skip data leads \u2014 and the opportunity to extend this across all services</div></div>\n        <div class=\"agenda-arrow\">\u2192</div>\n      </div>\n      <div class=\"agenda-item\" onclick=\"document.getElementById('seo').scrollIntoView({behavior:'smooth'})\">\n        <div class=\"agenda-num\">03</div>\n        <div><div class=\"agenda-label\">SEO Progress</div><div class=\"agenda-desc\">Organic traffic, leads and visibility \u2014 what's working, what needs attention</div></div>\n        <div class=\"agenda-arrow\">\u2192</div>\n      </div>\n      <div class=\"agenda-item\" onclick=\"document.getElementById('aimax').scrollIntoView({behavior:'smooth'})\">\n        <div class=\"agenda-num\">04</div>\n        <div><div class=\"agenda-label\">AI Max \u2014 The Smarter Scaling Play</div><div class=\"agenda-desc\">Finding demand you didn't know existed, without disrupting what's working</div></div>\n        <div class=\"agenda-arrow\">\u2192</div>\n      </div>\n      <div class=\"agenda-item\" onclick=\"document.getElementById('weighsoft').scrollIntoView({behavior:'smooth'})\">\n        <div class=\"agenda-num\">05</div>\n        <div><div class=\"agenda-label\">WeighSoft \u2014 The Custom Alternative</div><div class=\"agenda-desc\">Your own system, live tracking, automated value feedback, WhatsApp \u2014 and \u00a350\u201370k saved per year</div></div>\n        <div class=\"agenda-arrow\">\u2192</div>\n      </div>\n      <div class=\"agenda-item\" onclick=\"document.getElementById('voice').scrollIntoView({behavior:'smooth'})\">\n        <div class=\"agenda-num\">06</div>\n        <div><div class=\"agenda-label\">AI Voice Agent \u2014 Live Test</div><div class=\"agenda-desc\">Brainstorm, test the live number, and discuss the quotes agent</div></div>\n        <div class=\"agenda-arrow\">\u2192</div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- \u2500\u2500 PERFORMANCE \u2500\u2500 -->\n<section id=\"performance\">\n  <div class=\"section-inner\">\n    <div class=\"section-eyebrow\">01 \u2014 Conversion Value Feedback</div>\n    <h2>The value-feedback<br><span class=\"accent\">turning point.</span></h2>\n    <p class=\"section-intro\">When we activate conversion value feedback for skip hire, Google's AI bids on the value of each job \u2014 not just the lead. Here's the typical impact we see across our skip hire clients over a comparable five-month window.</p>\n\n    <!-- TIMELINE MARKER -->\n    <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:36px;\" class=\"reveal\">\n      <div style=\"flex:1;height:1px;background:var(--card-border);\"></div>\n      <div style=\"background:rgba(0,212,160,0.12);border:1px solid rgba(0,212,160,0.35);border-radius:30px;padding:10px 22px;display:flex;align-items:center;gap:10px;white-space:nowrap;\">\n        <span style=\"width:8px;height:8px;background:var(--green);border-radius:50%;display:inline-block;animation:pulse 2s infinite;flex-shrink:0;\"></span>\n        <span style=\"font-family:'Montserrat',sans-serif;font-size:11px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--green);\">Conversion Value Feedback Activated</span>\n      </div>\n      <div style=\"flex:1;height:1px;background:var(--card-border);\"></div>\n    </div>\n\n    <!-- CONTEXT CARDS -->\n    <div class=\"reveal\" style=\"margin-bottom:40px;\">\n      <div style=\"background:rgba(0,212,160,0.06);border:1px solid rgba(0,212,160,0.25);border-radius:16px;padding:28px;\">\n        <div style=\"font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--green);margin-bottom:12px;\">What value feedback changes</div>\n        <p style=\"font-size:14px;color:var(--text-muted);line-height:1.7;\">We feed the actual <strong style=\"color:white;\">job revenue values</strong> from WeighSoft back into Google Ads every week. Instead of Google's AI optimising for leads, it optimises for <strong style=\"color:white;\">the value of those leads</strong> \u2014 finding customers most likely to place higher-value skip orders.</p>\n      </div>\n    </div>\n\n    <!-- SKIP BEFORE/AFTER -->\n    <div class=\"section-eyebrow\" style=\"margin-bottom:12px;\">Skip Hire \u00b7 Before &amp; After Value Feedback</div>\n    <h2 style=\"font-size:clamp(22px,3vw,38px);margin-bottom:8px;\">The numbers speak <em>for themselves.</em></h2>\n    <p class=\"section-intro\" style=\"margin-bottom:28px;\">One change \u2014 Google now knows what each skip job is worth. These are the typical results we see across our skip hire clients.</p>\n\n    <div class=\"reveal\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:28px;\">\n      <div style=\"background:rgba(255,255,255,0.03);border:1px solid var(--card-border);border-radius:20px;padding:32px;\">\n        <div style=\"font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px;\">Before value feedback</div>\n        <div style=\"font-size:12px;color:var(--text-muted);margin-bottom:24px;\">No value feedback active</div>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;\">\n          <div>\n            <div style=\"font-family:'Montserrat',sans-serif;font-size:28px;font-weight:900;line-height:1;\">~\u00a360k</div>\n            <div style=\"font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.07em;margin-top:4px;\">Skip Spend</div>\n          </div>\n          <div>\n            <div style=\"font-family:'Montserrat',sans-serif;font-size:28px;font-weight:900;line-height:1;\">~3,300</div>\n            <div style=\"font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.07em;margin-top:4px;\">Skip Jobs</div>\n          </div>\n          <div>\n            <div style=\"font-family:'Montserrat',sans-serif;font-size:28px;font-weight:900;line-height:1;\">~\u00a3750k</div>\n            <div style=\"font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.07em;margin-top:4px;\">Skip Revenue</div>\n          </div>\n          <div>\n            <div style=\"font-family:'Montserrat',sans-serif;font-size:28px;font-weight:900;line-height:1;\">13\u00d7</div>\n            <div style=\"font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.07em;margin-top:4px;\">ROAS</div>\n          </div>\n        </div>\n        <div style=\"height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;\">\n          <div style=\"width:64%;height:100%;background:rgba(255,255,255,0.2);border-radius:3px;\"></div>\n        </div>\n        <div style=\"font-size:11px;color:var(--text-muted);margin-top:6px;\">13\u00d7 ROAS</div>\n      </div>\n\n      <div style=\"background:rgba(0,212,160,0.06);border:1px solid rgba(0,212,160,0.3);border-radius:20px;padding:32px;position:relative;\">\n        <div style=\"position:absolute;top:18px;right:18px;background:var(--green);color:var(--navy);font-family:'Montserrat',sans-serif;font-size:10px;font-weight:800;letter-spacing:0.1em;padding:4px 10px;border-radius:20px;\">VALUE FEEDBACK ON</div>\n        <div style=\"font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--green);margin-bottom:4px;\">After value feedback</div>\n        <div style=\"font-size:12px;color:var(--text-muted);margin-bottom:24px;\">Value feedback active</div>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;\">\n          <div>\n            <div style=\"font-family:'Montserrat',sans-serif;font-size:28px;font-weight:900;line-height:1;color:var(--green);\">~\u00a344k rely on keyword lists, it uses your landing pages, ad copy, and conversion history to find relevant searches you're not currently showing up for \u2014 long-tail queries and emerging search behaviours that a conventional keyword structure won't catch.\n      </div>\n      <div class=\"aimax-stats\">\n        <div class=\"aimax-stat\">\n          <div class=\"aimax-stat-val green\">\u00a31,000</div>\n          <div class=\"aimax-stat-label\">Separate test budget</div>\n        </div>\n        <div class=\"aimax-stat\">\n          <div class=\"aimax-stat-val\" style=\"color:var(--blue-light);\">Zero</div>\n          <div class=\"aimax-stat-label\">Money moved from live campaigns</div>\n        </div>\n        <div class=\"aimax-stat\">\n          <div class=\"aimax-stat-val\" style=\"color:var(--amber);\">Summer</div>\n          <div class=\"aimax-stat-label\">Ideal test period \u2014 high demand = fast data</div>\n        </div>\n      </div>\n      <div style=\"margin-top:28px;\">\n        <div style=\"font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;margin-bottom:12px;font-family:'Montserrat',sans-serif;\">Example queries AI Max could unlock</div>\n        <div class=\"aimax-examples\">\n          <div class=\"query-chip\">skip for house clearance</div>\n          <div class=\"query-chip\">same day skip delivery</div>\n          <div class=\"query-chip\">skip hire this weekend</div>\n          <div class=\"query-chip\">cheap skip large garden</div>\n          <div class=\"query-chip\">builders waste removal</div>\n          <div class=\"query-chip\">skip bag vs skip hire</div>\n        </div>\n      </div>\n    </div>\n\n    <div style=\"margin-top:24px;display:grid;grid-template-columns:1fr 1fr;gap:20px;\" class=\"reveal\">\n      <div style=\"background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:24px;\">\n        <div style=\"font-family:'Montserrat',sans-serif;font-weight:700;font-size:14px;margin-bottom:8px;color:var(--green);\">\u2713 If it works</div>\n        <div style=\"font-size:14px;color:var(--text-muted);line-height:1.6;\">We scale it \u2014 as we have with AI-powered bidding for other skip hire clients. New revenue from demand that didn't exist in your funnel before.</div>\n      </div>\n      <div style=\"background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:24px;\">\n        <div style=\"font-family:'Montserrat',sans-serif;font-weight:700;font-size:14px;margin-bottom:8px;color:var(--text-muted);\">If it doesn't</div>\n        <div style=\"font-size:14px;color:var(--text-muted);line-height:1.6;\">We use the learnings to inform future optimisation of the core Search and Performance Max campaigns. Either way, you learn. Nothing is disrupted.</div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- \u2500\u2500 WEIGHSOFT \u2500\u2500 -->\n<section id=\"weighsoft\">\n  <div class=\"section-inner\">\n    <div class=\"section-eyebrow\">05 \u2014 WeighSoft Replacement</div>\n    <h2>Your system.<br>Built <em>for you.</em></h2>\n    <p class=\"section-intro\">WeighSoft typically costs \u00a36,000\u2013\u00a38,000 per month \u2014 and rises every time you need something new. We map bespoke replacements that do more, cost less, and become yours.</p>\n\n    <div class=\"ws-problem reveal\">\n      <div class=\"ws-pain\">\n        <div class=\"ws-pain-head\">\u26a0\ufe0f The current situation</div>\n        <div class=\"ws-pain-item\">\n          <div class=\"ws-pain-dot\"></div>\n          <div><strong>\u00a36,000\u2013\u00a38,000/month</strong>WeighSoft licence fees \u2014 and the cost goes up every time a new service or feature is needed</div>\n        </div>\n        <div class=\"ws-pain-item\">\n          <div class=\"ws-pain-dot\"></div>\n          <div><strong>+\u00a31,100 per visit</strong>A WeighSoft engineer called in monthly to fix breakages \u2014 on top of the licence cost</div>\n
